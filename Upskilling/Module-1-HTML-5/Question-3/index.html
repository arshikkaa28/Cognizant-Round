<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Banner</title>

    <!-- Internal CSS -->
    <style>
        #welcomeBanner {
            background-color: blue;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .highlight {
            background-color: yellow;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <!-- Welcome Banner -->
    <div id="welcomeBanner">
        <h1>Welcome, User!</h1>

        <p>
            You have a
            <span style="color: red; font-weight: bold;">
                Special Offer!
            </span>
        </p>

        <p class="highlight">
            Register now to get exciting benefits.
        </p>

        <h3 class="highlight">
            Enjoy Your Visit!
        </h3>
    </div>

</body>

</html>
